name: safe_connect
description: Safe Connect - Hybrid Emergency and Communication Alert System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

# BLE Advertising
  flutter_ble_peripheral: ^1.0.1
  # Encryption
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

  # UI & Navigation
  cupertino_icons: ^1.0.6
  go_router: ^13.2.0

  # State Management
  provider: ^6.1.2

  # Local Storage
  sqflite: ^2.3.3
  path: ^1.9.0

  # Simple key-value storage
  shared_preferences: ^2.2.3

  # Bluetooth
  flutter_blue_plus: ^1.32.12
  

  # Location / GPS
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Firebase
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.4
  cloud_firestore: ^4.17.5

  # Permissions
  permission_handler: ^11.3.1

  # Connectivity
  connectivity_plus: ^6.0.3

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0

  # Notifications & Background
  flutter_local_notifications: ^17.2.2
  flutter_background_service: ^5.0.5

  # App Icon & Splash
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

  # Phone Contacts
  flutter_contacts: ^1.1.9+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/firstaid/firstaid_data.json
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#1565C0"
  image: assets/images/splash_logo.png
  android: true
  ios: false
  fullscreen: false

  # BLE Advertising
  url_launcher: ^6.3.0